apiVersion: apps/v1
kind: Deployment
metadata:
  name: polls
spec:
  replicas: 2
  selector:
    matchLabels:
      app: polls
  template:
    metadata:
      labels:
        app: polls
    spec:
      containers:
      - name: polls
        image: <ECR>/polls:latest
        ports:
        - containerPort: 3000