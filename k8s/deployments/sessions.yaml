apiVersion: apps/v1
kind: Deployment
metadata:
  name: sessions
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sessions
  template:
    metadata:
      labels:
        app: sessions
    spec:
      containers:
      - name: sessions
        image: ECR_REGISTRY/sessions:IMAGE_TAG
        ports:
        - containerPort: 3000